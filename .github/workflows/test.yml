name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26.x']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Run tests with coverage
      run: |
        go test -v -race -coverprofile=coverage.out -covermode=atomic ./pkg/... ./cmd/...
        go tool cover -func=coverage.out

    - name: Run tests with MySQL support
      run: make test-mysql
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
        cache: true

    - name: Start services
      run: |
        docker compose -f docker-compose.test.yml up -d
        sleep 10
      continue-on-error: true

    - name: Run integration tests
      run: go test -v -tags=integration ./test/integration/...
      continue-on-error: true

    - name: Stop services
      if: always()
      run: docker compose -f docker-compose.test.yml down
      continue-on-error: true

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
        cache: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential

    - name: Build application
      run: make build

    - name: Start server
      run: |
        # Create minimal test configuration
        cat > .env << 'EOF'
        HTTP_ENABLED=true
        HTTP_PORT=8080
        HTTP_TLS_ENABLED=false
        SIP_PORT=5060
        SIP_TLS_ENABLED=false
        STT_PROVIDER=opensource
        LOG_LEVEL=info
        RECORDING_PATH=/tmp/recordings
        RTP_PORT_MIN=10000
        RTP_PORT_MAX=10100
        EOF

        # Create recordings directory
        mkdir -p /tmp/recordings

        # Start server in background
        ./build/siprec &
        SERVER_PID=$!
        echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

        # Wait for server to be ready (max 60 seconds)
        for i in {1..30}; do
          if curl -s http://localhost:8080/health > /dev/null 2>&1; then
            echo "Server is ready"
            exit 0
          fi
          echo "Waiting for server... attempt $i"
          sleep 2
        done
        echo "Server failed to start"
        exit 1

    - name: Run E2E tests
      run: go test -v -tags=e2e ./test/e2e/...

    - name: Stop server
      if: always()
      run: |
        if [ -n "$SERVER_PID" ]; then
          kill $SERVER_PID 2>/dev/null || true
        fi

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
        cache: true

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        install-mode: goinstall
        args: --timeout 5m

  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
        cache: true

    - name: Run benchmarks
      run: go test -bench=. -benchmem ./pkg/...
