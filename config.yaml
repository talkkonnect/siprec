# SIPREC Server Configuration
# ============================
# This file contains all configuration options for the SIPREC server.
# Copy this file to config.yaml and modify as needed.
#
# Configuration Loading Priority:
#   1. Environment variables (highest priority - always override)
#   2. Config file (this file)
#   3. Default values
#
# To use this config file, either:
#   - Place it as config.yaml in the working directory
#   - Set CONFIG_FILE=/path/to/config.yaml environment variable
#   - Place it at /etc/siprec/config.yaml
#
# For secrets (API keys, passwords), use environment variables:
#   export DEEPGRAM_API_KEY=your-key
#   export GOOGLE_APPLICATION_CREDENTIALS=/path/to/credentials.json

# Network Configuration
# NOTE: This binary's YAML loader matches keys to the lowercased Go field name
# (no underscores), NOT snake_case. So the working keys are e.g. `externalip`,
# not `external_ip`. snake_case keys are silently ignored by this build.
# (snake_case works only if the binary is rebuilt with yaml: struct tags.)
network:
  # External IP for SDP/SIP -- advertised in SDP c= line so callers send RTP here
  # (external_ip)
  externalip: "172.16.15.232"

  # Internal IP for binding (internal_ip)
  internalip: "172.16.15.232"

  # SIP host address to bind to (0.0.0.0 = all interfaces)
  host: "0.0.0.0"

  # SIP ports to listen on (both UDP and TCP)
  ports:
    - 5060
    - 5061

  # RTP port range (rtp_port_min / rtp_port_max)
  rtpportmin: 16834
  rtpportmax: 32768

  # RTP inactivity timeout (rtp_timeout)
  rtptimeout: 30s

  # RTP bind IP (empty = all interfaces) (rtp_bind_ip)
  rtpbindip: ""

  # TLS Configuration (enable_tls / tls_port / tls_cert_file / tls_key_file)
  enabletls: false
  tlsport: 5062
  tlscertfile: "./certs/cert.pem"
  tlskeyfile: "./certs/key.pem"

  # SRTP Configuration (enable_srtp)
  enablesrtp: false

  # NAT Configuration (behind_nat / stun_servers)
  behindnat: false
  stunservers:
    - "stun.l.google.com:19302"
    - "stun1.l.google.com:19302"

# HTTP Server Configuration
http:
  port: 8080
  enabled: true
  enable_metrics: true
  enable_api: true
  read_timeout: 10s
  write_timeout: 30s

  # Optional TLS for the HTTP API
  tls_enabled: false
  # tls_cert_file: "/etc/siprec/http-cert.pem"
  # tls_key_file: "/etc/siprec/http-key.pem"

# Recording Configuration
recording:
  # Directory to store recordings
  directory: "./recordings"

  # Maximum recording duration
  max_duration: 4h

  # Days to keep recordings before cleanup (0 = no cleanup)
  cleanup_days: 30

  # Combine SIPREC legs into single multi-channel file
  combine_legs: true

  # Recording format: wav, mp3, opus
  format: "wav"

  # Cloud storage upload (credentials via environment variables)
  storage:
    enabled: false
    keep_local: true
    s3:
      enabled: false
      bucket: ""
      region: ""
      prefix: ""
    gcs:
      enabled: false
      bucket: ""
      prefix: ""
    azure:
      enabled: false
      account: ""
      container: ""
      prefix: ""

# Speech-to-Text Configuration
stt:
  # Default STT provider
  default_vendor: "google"

  # Enabled STT vendors
  supported_vendors:
    - "google"
    - "deepgram"
    - "azure"
    - "aws"
    - "openai"
    - "speechmatics"
    - "elevenlabs"

  # Supported audio codecs
  supported_codecs:
    - "PCMU"
    - "PCMA"
    - "G722"
    - "G729"
    - "OPUS"

  # Provider-specific settings (API keys via env vars)
  google:
    # credentials_file set via GOOGLE_APPLICATION_CREDENTIALS env var
    language: "en-US"
    enable_automatic_punctuation: true
    enable_word_time_offsets: true

  deepgram:
    # api_key set via DEEPGRAM_API_KEY env var
    model: "nova-2"
    language: "en"
    punctuate: true
    diarize: false

  azure:
    # key set via AZURE_SPEECH_KEY env var
    # region set via AZURE_SPEECH_REGION env var
    language: "en-US"

  openai:
    # api_key set via OPENAI_API_KEY env var
    model: "whisper-1"

# Logging Configuration
logging:
  # Log level: debug, info, warn, error, fatal
  level: "info"

  # Log format: json, text
  format: "json"

  # Output file (empty = stdout)
  output_file: ""

# Resource Limits
resources:
  max_concurrent_calls: 500

# Messaging Configuration (RabbitMQ/AMQP)
# Messaging is enabled by providing an AMQP URL and queue name.
messaging:
  # AMQP URL (set via AMQP_URL env var for secrets)
  # amqp_url: "amqp://user:pass@localhost:5672/"

  # Queue name for transcriptions
  amqp_queue_name: "siprec.transcriptions"

  # Real-time transcript delivery
  enable_realtime_amqp: false
  realtime_queue_name: "siprec_realtime"
  realtime_routing_key: "siprec.realtime"

  # Publishing options
  publish_partial_transcripts: true
  publish_final_transcripts: true
  publish_sentiment_updates: true
  publish_keyword_detections: true

  # Advanced AMQP connection settings
  amqp:
    heartbeat: 30s
    connection_timeout: 30s
    max_reconnect_attempts: 0  # 0 = unlimited

# Session Redundancy
redundancy:
  enabled: true
  session_timeout: 30s
  session_check_interval: 10s

  # Storage type: memory, redis
  storage_type: "memory"

# Redis Configuration (for session storage and clustering)
cluster:
  enabled: false
  node_id: "node-1"

  redis:
    mode: "standalone"  # standalone, sentinel, cluster
    address: "localhost:6379"
    # password set via REDIS_PASSWORD env var
    database: 0
    pool_size: 20

# Encryption Configuration
encryption:
  # Encrypt recordings and metadata at rest
  enable_recording_encryption: false
  enable_metadata_encryption: false
  algorithm: "aes-256-gcm"

  # Key rotation and backup
  key_rotation_interval: 24h
  key_backup_enabled: false

# PII Detection and Redaction
pii:
  enabled: false

  # Types of PII to detect
  enabled_types:
    - "ssn"
    - "credit_card"
    - "phone"
    - "email"

  # Redaction settings
  apply_to_recordings: false
  apply_to_transcriptions: true
  redaction_char: "*"

# Analytics Configuration
analytics:
  enabled: false

  # Elasticsearch integration
  elasticsearch:
    addresses:
      - "http://localhost:9200"
    index: "siprec-analytics"
    # username/password via env vars

# Compliance Configuration
compliance:
  pci:
    enabled: false

  gdpr:
    enabled: false
    export_dir: "./exports"

  audit:
    tamper_proof: false
    log_path: "./logs/audit-chain.log"

# Circuit Breaker Configuration
circuit_breaker:
  enabled: true

  # STT circuit breaker
  stt_failure_threshold: 3
  stt_timeout: 30s
  stt_request_timeout: 45s

  # AMQP circuit breaker
  amqp_failure_threshold: 5
  amqp_timeout: 60s

# Performance Monitoring
performance:
  enabled: true
  memory_limit_mb: 512
  cpu_limit: 80
  gc_threshold_mb: 100
  monitor_interval: 30s
  enable_auto_gc: true

# Rate Limiting
rate_limit:
  enabled: false

  # HTTP rate limiting
  requests_per_second: 100.0
  burst_size: 200

  # SIP rate limiting
  sip_enabled: false
  sip_requests_per_second: 100.0
  sip_request_burst: 200

# Async Speech-to-Text Job Queue (/api/stt/* endpoints)
async_stt:
  enabled: true
  worker_count: 3
  max_retries: 3
  retry_backoff: 30s
  job_timeout: 300s

# Hot Reload Configuration (/api/config endpoints)
hot_reload:
  enabled: true
  debounce_time: 2s
  backup_enabled: true
  backup_dir: "./config_backups"

# Tracing Configuration (OpenTelemetry)
tracing:
  enabled: false
  service_name: "siprec"

  # OTLP exporter
  endpoint: "localhost:4317"
  insecure: true

  # Sampling
  sample_ratio: 1.0

# Authentication
auth:
  # Enable HTTP API authentication (JWT and API keys)
  # Requires AUTH_JWT_SECRET to be set via environment variable
  enabled: false
  enable_api_keys: true
  token_expiry: 24h
  # jwt_secret set via AUTH_JWT_SECRET env var
  # Set AUTH_RBAC_ENABLED=true (env var) to enforce role-based access control

# Alerting Configuration
# Notification channels (email/SMTP, Slack, PagerDuty, webhook) are configured
# programmatically via the alerting subsystem. The email channel accepts
# smtp_host, smtp_port, username, password, from, to, and tls_mode settings.
alerting:
  enabled: false
  evaluation_interval: 30s
